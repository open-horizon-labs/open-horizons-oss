services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: open_horizons
      POSTGRES_USER: oh_user
      POSTGRES_PASSWORD: oh_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oh_user -d open_horizons"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://oh_user:oh_password@db:5432/open_horizons
      STRATEGY_PRESET: ${STRATEGY_PRESET:-open-horizons}
      NEXT_PUBLIC_STRATEGY_PRESET: ${STRATEGY_PRESET:-open-horizons}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
