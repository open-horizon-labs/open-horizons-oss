name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-unit-tests:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run unit tests
        run: pnpm test

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: open_horizons
          POSTGRES_USER: oh_user
          POSTGRES_PASSWORD: oh_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U oh_user -d open_horizons"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load database schema and seed data
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: oh_user
          PGPASSWORD: oh_password
          PGDATABASE: open_horizons
        run: |
          psql -f db/schema.sql
          psql -f db/seed.sql

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API tests
        env:
          DATABASE_URL: postgresql://oh_user:oh_password@localhost:5432/open_horizons
        run: pnpm test:api
